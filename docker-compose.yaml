services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: mongodb_study_hub
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:latest
    restart: no
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      bash -c "mongosh --host mongo:27017 --eval '
      try {
        rs.status();
      } catch (e) {
        rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]});
      }'"

  redis:
    image: redis:7-alpine
    restart: always
    container_name: redis_study_hub
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: api_study_hub
    ports:
      - "8080:8080"
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://mongo:27017/ai-study-hub?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - ENABLE_WORKERS=false
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: worker_study_hub
    command: ["node", "dist/worker.js"]
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://mongo:27017/ai-study-hub?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - ENABLE_WORKERS=true
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mongo_data:
  redis_data:
