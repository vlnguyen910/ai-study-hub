services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: mongodb_study_hub
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:latest
    restart: no
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      bash -c "mongosh --host mongo:27017 --eval 
      'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]})'"

volumes:
  mongo_data:
