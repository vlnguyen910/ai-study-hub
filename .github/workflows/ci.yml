name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ai-study-hub-api -f apps/api/Dockerfile .

      - name: Test running container
        run: |
          docker run -d --name api-test \
            -p 8080:8080 \
            -e DATABASE_URL="mongodb://localhost:27017/dummy?directConnection=true" \
            -e REDIS_URL="redis://localhost:6379" \
            -e JWT_SECRET="test-secret-key-12345" \
            -e FRONTEND_URL="http://localhost:3000" \
            -e CORS_ORIGINS="http://localhost:3000" \
            -e RESEND_API_KEY="" \
            ai-study-hub-api

          sleep 5

          if [ "$(docker inspect -f '{{.State.Running}}' api-test)" = "true" ]; then
            echo "Container is running successfully!"
            docker logs api-test
            docker stop api-test
            docker rm api-test
          else
            echo "Container failed to start or crashed!"
            docker logs api-test
            exit 1
          fi
